services:
  - type: web
    name: forecasting-api
    runtime: python
    buildCommand: pip install -r requirements-serve.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "3"
    healthCheckPath: /health
    autoDeploy: true
